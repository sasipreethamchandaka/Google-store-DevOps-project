apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:e1cd5a53454a13cd9cd431f822042f1495587679
          ports:
            - containerPort: 5000
