apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
          ports:
            - containerPort: 5000
