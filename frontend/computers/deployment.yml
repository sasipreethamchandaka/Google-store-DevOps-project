  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
        ports:
        - containerPort: 80
