apiVersion: apps/v1
kind: Deployment
metadata:
  name: computers-deployment
  labels:
    app: computers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: computers
  template:
    metadata:
      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-computers:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
