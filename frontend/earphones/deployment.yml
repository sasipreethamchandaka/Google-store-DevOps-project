apiVersion: apps/v1
kind: Deployment
metadata:
  name: earphones-deployment
  labels:
    app: earphones
spec:
  replicas: 2
  selector:
    matchLabels:
      app: earphones
  template:
    metadata:
      labels:
        app: earphones
    spec:
      containers:
      - name: earphones
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-earphones:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
