apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
        ports:
        - containerPort: 80
