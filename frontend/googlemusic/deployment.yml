apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlemusic:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
