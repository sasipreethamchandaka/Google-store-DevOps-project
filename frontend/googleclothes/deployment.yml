apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
