apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
