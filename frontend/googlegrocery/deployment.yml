apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
        ports:
        - containerPort: 80
