apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80
