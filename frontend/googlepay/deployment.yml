apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
        ports:
        - containerPort: 80
