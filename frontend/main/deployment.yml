apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:e1cd5a53454a13cd9cd431f822042f1495587679
        ports:
        - containerPort: 80

