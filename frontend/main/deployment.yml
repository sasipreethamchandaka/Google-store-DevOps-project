apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 730335582955.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:1c72e42dc8f7dc1e24ef4b8b248bc8871b79d609
        ports:
        - containerPort: 80

